    <!-- Primary meta -->

    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Waddle",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Waddle is an AI procurement assistant for SMEs in Malaysia and Singapore. It helps businesses find suppliers, compare prices, and negotiate deals autonomously via WhatsApp and email.",
      "url": "https://www.fovea.space/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "MYR"
      },
      "creator": {
        "@type": "Organization",
        "name": "Fovea",
        "url": "https://www.fovea.space/"
      },
      "featureList": [
        "AI-powered supplier search across Malaysia and Singapore",
        "Automated price and contact comparison",
        "Autonomous WhatsApp and email negotiation",
        "Full negotiation reports",
        "Excel export of supplier recommendations"
      ],
      "areaServed": ["Malaysia", "Singapore"]
    }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Fovea",
      "url": "https://www.fovea.space/",
      "description": "Fovea builds AI-powered business tools for SMEs in Southeast Asia. Waddle is their procurement automation product.",
      "areaServed": ["Malaysia", "Singapore"]
    }
    </script>

    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Waddle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Waddle is an AI procurement tool built for SMEs in Malaysia and Singapore. It helps businesses find suppliers, compare prices, and negotiate deals. It can also handle the full negotiation autonomously via WhatsApp or email through its Waddle for Me service."
          }
        },
        {
          "@type": "Question",
          "name": "How does Waddle find suppliers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Waddle uses AI to search curated supplier directories across Malaysia and Singapore. Tell Waddle what you need, and it returns up to 4 ranked supplier recommendations with prices and contact details within minutes."
          }
        },
        {
          "@type": "Question",
          "name": "What is Waddle for Me?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Waddle for Me is a done-for-you negotiation service. You provide a supplier's phone number or email and your procurement requirements. Waddle's AI agent then contacts the supplier via WhatsApp or email, negotiates the best price on your behalf, and delivers a full report within 6 to 8 hours."
          }
        },
        {
          "@type": "Question",
          "name": "Which countries does Waddle operate in?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Waddle currently serves SMEs in Malaysia and Singapore, with supplier directories covering both markets."
          }
        },
        {
          "@type": "Question",
          "name": "Who built Waddle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Waddle is built by Fovea, a company focused on AI-powered business tools for Southeast Asian SMEs. The AI is powered by Lua AI, a Y Combinator-backed company."
          }
        }
      ]
    }
    </script>
